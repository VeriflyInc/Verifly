<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Verifly - 認証</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f6f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      position: relative;
    }

    /* 戻るボタン */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      text-decoration: none;
      color: #111;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.2s;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .back-btn:hover {
      transform: scale(1.05);
    }

    .container {
      background: white;
      padding: 50px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 420px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 30px;
    }

    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      background: #000;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      transition: 0.2s;
      cursor: pointer;
    }

    .btn:hover {
      background: #333;
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <!-- 戻る -->
  <a class="back-btn" href="index.html">← 戻る</a>

  <div class="container">
    <h1>認証レベルを選択</h1>
    <div class="sub">あなたのSNS活動歴に基づいて審査方法が変わります</div>

    <!-- 1年以上 -->
    <a class="btn" href="kuroto.html">
      SNS活動歴が1年以上
    </a>

    <!-- 1年未満 -->
    <a class="btn" href="siroto.html">
      SNS活動歴が1年未満
    </a>

  </div>

</body>
</html>
