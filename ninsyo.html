<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Verifly - 認証</title>

  <style>
    body {
      font-family: Arial;
      background: #f6f7fb;
      text-align: center;
      padding-top: 120px;
    }

    h1 {
      font-size: 40px;
    }

    .box {
      margin-top: 40px;
      display: inline-block;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      width: 260px;
      margin-top: 10px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h1>認証ページ</h1>

  <div class="box">
    <p>アーティスト名を入力</p>
    <input type="text" placeholder="例：メタリカ">
    <br>
    <button>認証開始</button>
  </div>

</body>
</html>
