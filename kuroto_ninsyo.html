<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifly - ISRC本人確認</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif}
    body{min-height:100vh;background:radial-gradient(circle at 18% 20%,rgba(0,119,255,.12),transparent 32%),linear-gradient(to bottom,#fff,#f5f7fb);color:#111;overflow-x:hidden}
    body.loaded .page-header,body.loaded .panel,body.loaded .step-card{opacity:1;transform:translateY(0)}
    .navbar{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:18px 9vw;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,0,0,.07);z-index:1000}
    .logo{color:#111;text-decoration:none;font-size:18px;font-weight:900}.back-btn{color:#111;text-decoration:none;font-size:13px;font-weight:800;padding:10px 14px;border:1px solid #e5e9f0;border-radius:8px;background:rgba(255,255,255,.76);transition:.25s}
    .back-btn:hover{color:#0077ff;border-color:#0077ff;transform:translateY(-2px)}
    main{width:min(1120px,calc(100% - 40px));margin:0 auto;padding:130px 0 70px}.page-header{max-width:820px;margin-bottom:34px;opacity:0;transform:translateY(28px);transition:.8s}
    .eyebrow{display:inline-block;margin-bottom:14px;color:#0077ff;font-size:13px;font-weight:900}h1{font-size:clamp(34px,5vw,56px);line-height:1.15;margin-bottom:18px}.lead{color:#444;font-size:16px;line-height:1.9}
    .layout{display:grid;grid-template-columns:1fr .9fr;gap:24px;align-items:start}.panel{padding:30px;border:1px solid #e5e9f0;border-radius:8px;background:rgba(255,255,255,.78);box-shadow:0 22px 60px rgba(20,30,45,.08);opacity:0;transform:translateY(34px);transition:.8s}
    .panel-title{font-size:24px;margin-bottom:10px}.panel-sub{color:#555;font-size:14px;line-height:1.8;margin-bottom:24px}.status-box{padding:18px;border-radius:8px;border:1px solid #dfe5ee;background:#f8fafc;margin-bottom:18px}
    .status-label{color:#0077ff;font-size:12px;font-weight:900;margin-bottom:8px}.status-main{font-size:18px;font-weight:900;line-height:1.5}.status-detail{margin-top:8px;color:#555;font-size:13px;line-height:1.7;word-break:break-word}
    .meta-grid{display:grid;gap:12px;margin-top:20px}.meta-row{display:grid;grid-template-columns:130px 1fr;gap:14px;padding:13px 0;border-bottom:1px solid #edf0f4;font-size:14px}.meta-row strong{color:#222}.meta-row span{color:#555;word-break:break-word}
    .actions{display:grid;gap:12px;margin-top:24px}.primary-btn,.secondary-btn,button{width:100%;padding:15px;border:none;border-radius:8px;background:#111;color:#fff;font-size:15px;font-weight:900;cursor:pointer;text-decoration:none;text-align:center;display:inline-block;transition:.25s}
    .secondary-btn{background:#0077ff}.secondary-btn:hover{background:#0068de}.primary-btn:hover,button:hover{background:#222}.disabled{pointer-events:none;opacity:.48}
    .message{display:none;margin-top:16px;padding:15px;border-radius:8px;font-size:13px;font-weight:800;line-height:1.7}.message.show{display:block}.message.error{background:#fff1f2;color:#be123c}.message.success{background:#f0fdf4;color:#15803d}.message.info{background:#eff6ff;color:#1d4ed8}
    .steps{display:grid;gap:16px}.step-card{padding:22px;border:1px solid #e5e9f0;border-radius:8px;background:rgba(255,255,255,.72);opacity:0;transform:translateY(34px);transition:.8s}.step-card strong{display:block;color:#0077ff;font-size:12px;margin-bottom:10px}.step-card h2{font-size:19px;margin-bottom:8px}.step-card p{color:#555;font-size:14px;line-height:1.8}
    .score-note{margin-top:18px;padding:18px;border-left:4px solid #38a169;border-radius:8px;background:rgba(255,255,255,.76);color:#465160;font-size:14px;line-height:1.8}.loader{width:22px;height:22px;border:3px solid #dbe5f0;border-top-color:#0077ff;border-radius:50%;animation:spin .8s linear infinite;margin:16px 0 0}@keyframes spin{to{transform:rotate(360deg)}}.footer-note{margin-top:34px;text-align:center;color:#8792a3;font-size:12px}
    @media(max-width:860px){.navbar{padding:16px 22px}main{width:min(100% - 34px,1120px);padding-top:112px}.layout{grid-template-columns:1fr}.meta-row{grid-template-columns:1fr;gap:5px}}
  </style>
</head>
<body>
